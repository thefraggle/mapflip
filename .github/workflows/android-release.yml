name: Android Release Build

on:
  push:
    tags:
      - v*
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build & Upload
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Prepare Build Metadata
        id: metadata
        run: |
          echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(git log -1 --format=%cd --date=format:%d.%m.%Y\ %H:%M)" >> $GITHUB_OUTPUT
          
          # Extract base version from build.gradle.kts
          GRADLE_VERSION=$(grep "val appVersion =" app/build.gradle.kts | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/')
          
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_NAME="${{ github.ref_name }}"
            APP_VERSION="${TAG_NAME#v}"
          else
            APP_VERSION="$GRADLE_VERSION"
          fi
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT
          
          # Extract raw English changelog for GitHub Release body
          python3 -c "import re, os; content = open('docs/CHANGELOG.en.md', encoding='utf-8').read(); m = re.search(r'## \d+\.\d+\.\d+.*?\n(.*?)(?=\n## \d+\.\d+\.\d+|$)', content, re.DOTALL); open('release_body.md', 'w', encoding='utf-8').write(m.group(1).strip() if m else 'Release notes automatically published.')"

      - name: Run Unit Tests
        run: ./gradlew :app:testDebugUnitTest --build-cache

      - name: Decode Keystore & Configure signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          # Decode keystore JKS file into RUNNER_TEMP
          python3 -c "import os, base64; open(os.environ['RUNNER_TEMP'] + '/keystore.jks', 'wb').write(base64.b64decode(os.environ['KEYSTORE_BASE64']))"
          
          # Write keystore.properties for Gradle build
          echo "storeFile=$RUNNER_TEMP/keystore.jks" > keystore.properties
          echo "storePassword=$KEYSTORE_PASSWORD" >> keystore.properties
          echo "keyAlias=$KEY_ALIAS" >> keystore.properties
          echo "keyPassword=$KEY_PASSWORD" >> keystore.properties

      - name: Build Signed Release APK & AAB
        run: |
          ./gradlew :app:assembleRelease :app:bundleRelease \
            --build-cache --parallel --configuration-cache \
            -PversionName=${{ steps.metadata.outputs.app_version }} \
            -PcommitHash=${{ steps.metadata.outputs.hash }} \
            -PcommitDate="${{ steps.metadata.outputs.date }}" \
            -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Copy Signed Artifacts
        run: |
          AAB_PATH=$(find app/build/outputs/bundle/release -name "*.aab" | head -n 1)
          cp "$AAB_PATH" MapFlip-v${{ steps.metadata.outputs.app_version }}-release.aab
          
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          cp "$APK_PATH" MapFlip-v${{ steps.metadata.outputs.app_version }}-release.apk

      - name: Prepare Release Notes
        run: |
          python3 -c "
          import re, os
          def get_latest(f):
              if not os.path.exists(f): return 'Release notes automatically published.'
              m = re.search(r'## \d+\.\d+\.\d+.*?\n(.*?)(?=\n## \d+\.\d+\.\d+|$)', open(f, encoding='utf-8').read(), re.DOTALL)
              return m.group(1).strip() if m else 'Release notes automatically published.'
          de = get_latest('docs/CHANGELOG.md')
          en = get_latest('docs/CHANGELOG.en.md')
          os.makedirs('release-notes', exist_ok=True)
          for loc in ['de-DE']: open(f'release-notes/whatsnew-{loc}', 'w', encoding='utf-8').write(de)
          for loc in ['en-US', 'da-DK', 'fr-FR', 'it-IT', 'ja-JP', 'nl-NL', 'no-NO', 'pl-PL', 'pt-BR', 'pt-PT', 'sv-SE', 'es-ES', 'tr-TR']: open(f'release-notes/whatsnew-{loc}', 'w', encoding='utf-8').write(en)
          "

      # Create GitHub Release with signed AAB & APK
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MapFlip-v${{ steps.metadata.outputs.app_version }}-release.aab
            MapFlip-v${{ steps.metadata.outputs.app_version }}-release.apk
          name: Release ${{ github.ref_name }}
          body_path: release_body.md
          prerelease: false
          make_latest: true

      # Upload to Closed Testing (Alpha track) in Play Console
      - name: Upload to Google Play (Closed Testing)
        if: startsWith(github.ref, 'refs/tags/')
        uses: r0adkll/upload-google-play@7f5b759879c088a86faf85d18779f7f14e79a086
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: de.goork.mapflip
          releaseFiles: MapFlip-v${{ steps.metadata.outputs.app_version }}-release.aab
          tracks: alpha
          status: completed
          whatsNewDirectory: ${{ github.workspace }}/release-notes
